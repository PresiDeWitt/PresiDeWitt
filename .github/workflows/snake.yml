name: Generate Snake and WakaTime Stats

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-custom.svg?color_snake=00d9ff&color_dots=#161b22,#0d2818,#0f6d31,#00c647,#00d9ff&color_background=0d1117

      - name: Update WakaTime Stats
        uses: athul/waka-readme@master
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

      - name: Commit and Push Snake Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add dist/*.svg
          if ! git diff --staged --quiet; then
            git commit -m "Generate new snake animation"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push failed, retrying ($i/3)..."
              sleep 5
            done
          else
            echo "No changes in snake animation to commit."
          fi
